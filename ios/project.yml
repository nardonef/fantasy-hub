name: FantasyHub
options:
  bundleIdPrefix: com.fantasyhub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  ClerkIOS:
    url: https://github.com/clerk/clerk-ios
    from: "1.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  FantasyHub:
    type: application
    platform: iOS
    sources:
      - FantasyHub
    dependencies:
      - package: ClerkIOS
        product: ClerkKit
      - package: ClerkIOS
        product: ClerkKitUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fantasyhub.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Fantasy Hub"
    info:
      path: FantasyHub/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - fantasyhub
            CFBundleURLName: com.fantasyhub.app
